<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e0e" />
    <title>Mesa de Guerra — Tabuleiro 3D</title>
  </head>
  <body>
    <main id="game" tabindex="0" aria-label="Tabuleiro 3D medieval com três tropas">
      <header class="hud-title">
        <span class="sigil">♜</span>
        <div><small>CRÔNICAS DOS REINOS</small><h1>TRONOS EM RUÍNAS</h1></div>
      </header>
      <button id="draw-card" class="sr-only" aria-label="Comprar carta do baralho 3D">Comprar carta <span id="deck-count">28</span></button>
      <section id="deck-preview" class="deck-preview" aria-live="polite" aria-hidden="true"></section>
      <aside id="hover-card" class="hover-card" aria-hidden="true">
        <div class="hover-heading"><span id="hover-role">UNIDADE</span><b id="hover-used">DISPONÍVEL</b></div>
        <h3 id="hover-name">—</h3>
        <div class="hover-hp"><span>HP</span><i><em id="hover-hp-fill"></em></i><b id="hover-hp">0/0</b></div>
        <div class="hover-stats"><span><small>DANO</small><b id="hover-damage">0</b></span><span><small>MOV.</small><b id="hover-move">0</b></span><span><small>CUSTO</small><b id="hover-cost">0</b></span></div>
        <div class="hover-ability"><small>HABILIDADE ESPECIAL</small><strong id="hover-ability">—</strong><p id="hover-description">—</p></div>
      </aside>
      <div class="base-health enemy-base-tag" role="img" aria-label="Vida do castelo inimigo: 16 de 20"><i style="width:80%"></i></div>
      <section class="card-dock" aria-label="Mão de cartas">
        <div class="dock-label"><span>MÃO DO REINO</span><b id="hand-count">6 CARTAS</b></div>
        <button class="tray-nav tray-prev" id="tray-prev" aria-label="Ver cartas anteriores">‹</button>
        <div id="card-hand" class="card-hand"></div>
        <button class="tray-nav tray-next" id="tray-next" aria-label="Ver próximas cartas">›</button>
      </section>
      <div class="bottom-command">
        <div class="command-resource energy"><small>ENERGIA</small><b>8 <em>/ 10</em></b></div>
        <div class="turn-action"><span id="turn-label">TURNO DE REI ALDRIC</span><button id="end-turn"><i></i> PASSAR TURNO <kbd>↵</kbd></button></div>
        <div class="command-resource health"><small>HP DO REI</small><b>18 <em>/ 20</em></b></div>
      </div>
      <div class="loading"><div class="loader-mark">✦</div><span>PREPARANDO O CAMPO</span></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
