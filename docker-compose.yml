services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tronos
      POSTGRES_USER: tronos
      POSTGRES_PASSWORD: tronos_local
    ports:
      - "5432:5432"
    volumes:
      - tronos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tronos -d tronos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tronos_postgres_data:
